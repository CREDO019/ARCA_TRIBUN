<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" role="img" aria-labelledby="title desc">
  <title id="title">ARCA TRİBÜN portfolio pilot</title>
  <desc id="desc">Black and red stadium-inspired banner for the ARCA TRİBÜN Flutter portfolio project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08090b"/>
      <stop offset="55%" stop-color="#15171c"/>
      <stop offset="100%" stop-color="#3e090c"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76171c"/>
      <stop offset="100%" stop-color="#e22931"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1440" height="480" fill="url(#bg)"/>
  <path d="M0 370 C280 250 530 220 720 220 C910 220 1160 250 1440 370" fill="none" stroke="#2b2f35" stroke-width="30"/>
  <path d="M0 410 C280 290 530 260 720 260 C910 260 1160 290 1440 410" fill="none" stroke="#b5121b" stroke-width="4" opacity=".78" filter="url(#glow)"/>
  <path d="M100 450 L100 350 M180 420 L180 320 M1260 420 L1260 320 M1340 450 L1340 350" stroke="#3b4048" stroke-width="8"/>
  <circle cx="720" cy="260" r="112" fill="none" stroke="#b5121b" stroke-width="3" opacity=".48"/>
  <circle cx="720" cy="260" r="76" fill="none" stroke="#f14a52" stroke-width="2" opacity=".3"/>
  <text x="720" y="150" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="5">ARCA TRİBÜN</text>
  <text x="720" y="205" text-anchor="middle" fill="#f14a52" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="6">FLUTTER PORTFOLIO PILOT</text>
  <text x="720" y="338" text-anchor="middle" fill="#c9cdd3" font-family="Arial, sans-serif" font-size="19" letter-spacing="3">MATCHDAY ASSISTANT · LIVE CENTER · SQUAD · OFFLINE FALLBACK</text>
</svg>
