name: arca_tribun
description: ARCA Tribün — Arca Çorum FK Official Fan Engagement Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.5.0

  # Push Notifications (FCM token yönetimi için korundu)
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2

  # Crash Reporting
  sentry_flutter: ^8.3.0

  # Analytics
  mixpanel_flutter: ^2.3.0

  # Audio & Sound
  just_audio: ^0.9.38
  audio_session: ^0.1.18
  soundpool: ^2.3.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Localization
  easy_localization: ^3.0.7
  intl: ^0.20.2

  # Local Storage & Cache
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  flutter_cache_manager: ^3.3.1
  shared_preferences: ^2.5.5

  # Connectivity
  connectivity_plus: ^6.0.3

  # UI & Animations
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Auth Providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # Utils
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  url_launcher: ^6.2.5
  share_plus: ^12.0.2
  vibration: ^1.9.0

  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.11
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/translations/
    - assets/lottie/
    - assets/images/
    - assets/images/onboarding/
